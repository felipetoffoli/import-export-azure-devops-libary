<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Library .env Tools</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <h1>Importar / Exportar .env para Library</h1>

  <div class="form-group">
    <label>Organization:</label>
    <input type="text" id="org" placeholder="ex: minha-org" />
  </div>

  <div class="form-group">
    <label>Project:</label>
    <input type="text" id="project" placeholder="ex: meu-projeto" />
  </div>

  <div class="form-group">
    <label>Personal Access Token (PAT):</label>
    <input type="password" id="pat" placeholder="Token pessoal com permissão" />
  </div>

  <div class="form-group">
    <label>ID da Variable Group:</label>
    <input type="text" id="groupId" placeholder="ex: 42" />
  </div>

  <div class="buttons">
    <button onclick="exportEnvFile()">Exportar .env</button>
    <input type="file" id="envFile" onchange="importEnvFile(event)" />
  </div>
</body>
</html>
